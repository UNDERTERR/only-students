server:
  port: 8012

spring:
  application:
    name: search-service
  config:
    import:
      - optional:nacos:application-${spring.profiles.active:}.yaml
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: public
        group: DEFAULT_GROUP
      config:
        server-addr: localhost:8848
        file-extension: yaml
        namespace: public
        group: DEFAULT_GROUP
        import-check:
          enabled: false

# JWT
jwt:
  secret: OnlyStudentsSecretKey2024
  expiration: 86400000
