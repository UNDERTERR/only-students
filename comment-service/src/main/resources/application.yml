server:
  port: 8006

spring:
  application:
    name: comment-service
  profiles:
    active: dev
  config:
    import:
      - optional:nacos:comment-service-${spring.profiles.active}.yaml
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: ""
        group: DEFAULT_GROUP
      config:
        server-addr: localhost:8848
        file-extension: yaml
        namespace: ""
        group: DEFAULT_GROUP
        import-check:
          enabled: false
