server:
  port: 8080

spring:
  application:
    name: gateway-service
  profiles:
    active: dev   # 以后切环境只改这里
  config:
    import:
      - optional:nacos:gateway-service-${spring.profiles.active}.yaml
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: ""
        group: DEFAULT_GROUP
      config:
        server-addr: localhost:8848
        file-extension: yaml
        namespace: ""
        group: DEFAULT_GROUP
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      httpclient:
        response-timeout: 30000
        import-check:
          enabled: false
        pool:
          type: elastic
          max-connections: 1000
          max-life-time: 30s
      routes:
        # 用户服务
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**,/api/sms/**
          filters:
            - StripPrefix=1

        # 笔记服务
        - id: note-service
          uri: lb://note-service
          predicates:
            - Path=/api/note/**
          filters:
            - StripPrefix=1

        # 文件服务
        - id: file-service
          uri: lb://file-service
          predicates:
            - Path=/api/file/**
          filters:
            - StripPrefix=1

        # 订阅服务
        - id: subscription-service
          uri: lb://subscription-service
          predicates:
            - Path=/api/subscription/**
          filters:
            - StripPrefix=1

        # 支付服务
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payment/**
          filters:
            - StripPrefix=1

        # 评论服务
        - id: comment-service
          uri: lb://comment-service
          predicates:
            - Path=/api/comment/**
          filters:
            - StripPrefix=1

        # 评分服务
        - id: rating-service
          uri: lb://rating-service
          predicates:
            - Path=/api/rating/**
          filters:
            - StripPrefix=1
        
        # 收藏服务（rating-service）
        - id: rating-service-favorite
          uri: lb://rating-service
          predicates:
            - Path=/api/favorite/**
          filters:
            - StripPrefix=1
        # 消息服务
        - id: message-service
          uri: lb://message-service
          predicates:
            - Path=/api/message/**
          filters:
            - StripPrefix=1

        # 消息服务WebSocket
        - id: message-service-ws
          uri: ws://localhost:8008
          predicates:
            - Path=/ws/message

        # 通知服务
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notification/**
          filters:
            - StripPrefix=1

        # 搜索服务
        - id: search-service
          uri: lb://search-service
          predicates:
            - Path=/api/search/**
          filters:
            - StripPrefix=1

        # 举报服务
        - id: report-service
          uri: lb://report-service
          predicates:
            - Path=/api/report/**
          filters:
            - StripPrefix=1

        # 提现服务
        - id: withdrawal-service
          uri: lb://withdrawal-service
          predicates:
            - Path=/api/withdrawal/**
          filters:
            - StripPrefix=1

        # 数据中心
        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/analytics/**
          filters:
            - StripPrefix=1

        # 后台管理
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/admin/**
          filters:
            - StripPrefix=1
  data:
    redis:
      database: 0
      host: localhost
      port: 6379
      password: xiaojie666
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# JWT配置
jwt:
  secret: OnlyStudentsSecretKey2024
  expiration: 86400000  # 24小时

# 白名单路径（不需要认证）
whitelist:
  paths: /api/sms/send,/api/user/register,/api/user/login,/api/user/refresh-token,/api/user/**,/api/note,/api/note/latest,/api/note/hot,/api/note/*,/api/search/**,/api/file/preview/**,/api/notification/sse/subscribe

# Sentinel配置
sentinel:
  transport:
    dashboard: localhost:8858  # Sentinel控制台地址
  eager: true  # 取消懒加载，启动时立即注册
